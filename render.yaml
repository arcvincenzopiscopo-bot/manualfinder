services:
  # ─────────────────────────────────────────────
  # BACKEND — FastAPI su Docker
  # ─────────────────────────────────────────────
  - type: web
    name: manualfinder-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free          # cambia in "starter" per più risorse
    healthCheckPath: /health
    envVars:
      # Render imposta $PORT automaticamente — uvicorn lo legge via CMD nel Dockerfile
      - key: ENVIRONMENT
        value: production
      - key: API_TIER
        value: auto
      - key: MAX_PDF_SIZE_MB
        value: "50"
      - key: RATE_LIMIT_PER_MINUTE
        value: "10"
      # ALLOWED_ORIGINS: aggiungi l'URL del frontend Render dopo il primo deploy
      # Formato: https://manualfinder-frontend.onrender.com
      - key: ALLOWED_ORIGINS
        value: "https://manualfinder-frontend.onrender.com,http://localhost:5173"
      # ── API Keys (inserisci nel Dashboard Render, NON nel codice) ──
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PERPLEXITY_API_KEY
        sync: false
      - key: BRAVE_SEARCH_API_KEY
        sync: false
      - key: GOOGLE_CSE_API_KEY
        sync: false
      - key: GOOGLE_CSE_CX
        sync: false

  # ─────────────────────────────────────────────
  # FRONTEND — React/Vite come Static Site
  # ─────────────────────────────────────────────
  - type: web
    name: manualfinder-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    pullRequestPreviewsEnabled: false
    envVars:
      # Inserisci nel Dashboard Render l'URL del backend dopo il primo deploy
      # Esempio: https://manualfinder-backend.onrender.com
      - key: VITE_API_BASE_URL
        sync: false
    headers:
      - path: /sw.js
        name: Cache-Control
        value: "no-cache, no-store, must-revalidate"
      - path: /sw.js
        name: Service-Worker-Allowed
        value: "/"
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      # SPA routing: tutte le route → index.html (come vercel.json)
      - type: rewrite
        source: /*
        destination: /index.html
